    <div class="container">
      <h2>request a session</h2>
      <p class="section-sub">Complete the form below. You will be contacted within 24hrs after submission.</p>
      
      <form id="bookingForm" class="booking-form">
        <div class="form-group">
          <label for="fullName">Full Name *</label>
          <input type="text" id="fullName" name="fullName" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="location">Preferred Location</label>
          <input type="text" id="location" name="location" placeholder="e.g., South Africa, Japan, Patagonia">

        <div class="form-group">
          <label for="request">Additional Request</label>
          <textarea id="request" name="request" rows="3" placeholder="Special arrangements, accessibility, etc."></textarea>
        </div>
        
        <div class="form-group">
          <label for="referral">Referral Code</label>
          <input type="text" id="referral" name="referral" placeholder="HOS-DISCRETE">
        </div>
